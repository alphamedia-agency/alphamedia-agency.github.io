     html {
      scrollbar-color: #ff4500 #f0f0f0;
    }

    body {
      font-family: 'Archivo', sans-serif;
      overflow-x: hidden;
    }

    .project-gallery {
      margin: 70px 0;
      padding: 0 20px;
    }
    
    .grid-container {
      height: 80%;
      width: 100%;
      justify-content: center;
      margin: 10px 0;
      border-radius: 15px;
      overflow: hidden;
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(300px, 1fr));
      gap: 15px;
      object-fit: cover;
    }
  
    .gallery-item {
      overflow: hidden;
      border-radius: 15px;
    }


    .gallery-item img {
      height: 100%;
      width: 100%;
      overflow: hidden;
      object-fit: cover;
    }

    .gallery-item img:hover {
        scale: calc(1.1);
        transition: 1s;
        cursor: pointer;
    }

    .video-container {
      height: 80%;
      width: 100%;
      justify-self: center;
      margin: 10px 0;
      border-radius: 15px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1, minmax(350px, 1fr);
      gap: 15px;
      object-fit: cover;
    }

    .video-container video {
      height: 100%;
      width: 100%;

    }


    /* LOADING ANIMATION START */
    .loader {
    z-index: 1;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: opacity 6s, visibility 0.6s;
  }
  .loader-hidden {
    opacity: 0;
    visibility: hidden;
  }
  .loader::after {
    content: "";
    width: 75px;
    height: 75px;
    border: 15px solid #dddddd;
    border-top-color: #ff5733;
    border-radius: 50%;
    animation: loading 1s  linear infinite;
  }

  @keyframes loading {
    from {
      transform: rotate(0turn);
    }
    to {
      transform: rotate(2turn);
    }
  }

    /* LOADING ANIMATION END */
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }
    
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .animate-float {
      animation: float 6s ease-in-out infinite;
    }
    
    .animate-fade-up {
      animation: fade-up 0.8s ease-out forwards;
    }
    
    .animate-fade-in {
      animation: fade-in 0.6s ease-out forwards;
    }
    
    .animation-delay-200 { animation-delay: 200ms; }
    .animation-delay-400 { animation-delay: 400ms; }
    .animation-delay-600 { animation-delay: 600ms; }
    
    .project-card:hover .project-image {
      transform: scale(1.1);
    }
    
    .project-card:hover .project-overlay {
      opacity: 1;
    }
    
    .project-card:hover .view-link {
      opacity: 1;
      transform: translateY(0);
    }
    
    .scroll-smooth {
      scroll-behavior: smooth;
    }
  </style>
